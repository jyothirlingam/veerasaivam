<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>వీరశైవ కమ్యూనిటీ పోర్టల్</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #090296; --secondary: #04b03a; --accent: #f2f54e; --danger: #ff0015; --bg: #f4f7fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Telugu', 'Poppins', sans-serif; }
        body { background: var(--bg); min-height: 100vh; padding-bottom: 90px; }

        .screen { display: none; padding: 15px; animation: fadeInUp 0.4s ease; max-width: 1200px; margin: 0 auto; }
        .active-screen { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 1. PREMIUM FLOATING BANNER (Notice Board) --- */
        .notice-container { 
            background: #ffffff; margin: 10px auto 20px auto; padding: 10px 18px; border-radius: 15px; 
            display: flex; align-items: center; box-shadow: 0 10px 25px rgba(9, 2, 150, 0.08); 
            border-left: 5px solid var(--danger); max-width: 95%; overflow: hidden; position: relative;
        }
        .notice-icon-box { background: #fff0f1; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 15px; flex-shrink: 0; }
        .notice-icon-box i { color: var(--danger); font-size: 18px; }
        .notice-content { flex-grow: 1; overflow: hidden; }
        .notice-label-small { font-size: 10px; font-weight: 800; color: var(--danger); text-transform: uppercase; display: block; margin-bottom: 2px; letter-spacing: 1px; }
        marquee { font-size: 13px; color: var(--primary); font-weight: 600; }

        /* --- 2. RESPONSIVE GRID SYSTEM --- */
        .reg-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 20px; }
        @media (min-width: 600px) { .reg-grid { grid-template-columns: 1fr 1fr; } }

        /* --- 3. MODERN FLOATING INPUTS --- */
        .f-group { position: relative; margin-bottom: 20px; width: 100%; text-align: left; }
        .f-group input, .f-group select { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 15px; outline: none; background: #fff; font-size: 16px; display: block; transition: 0.3s; }
        .f-group label { position: absolute; top: 15px; left: 15px; font-size: 15px; color: #999; transition: 0.2s ease-all; pointer-events: none; background: white; padding: 0 5px; }
        .f-group input:focus ~ label, .f-group input:not(:placeholder-shown) ~ label, .f-group select:focus ~ label, .f-group select:not([value=""]):valid ~ label { top: -10px; left: 10px; font-size: 12px; color: var(--primary); font-weight: bold; }
        .f-group input:focus { border-color: var(--primary); }
        .toggle-pass { position: absolute; right: 15px; top: 18px; color: #999; cursor: pointer; z-index: 10; font-size: 18px; }

        /* --- 4. DIRECTORY & FILTER UI --- */
        .filter-wrap { display: flex; gap: 10px; margin-bottom: 20px; background: white; padding: 12px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); align-items: center; }
        .srch-box { position: relative; flex: 2; }
        .bld-box { position: relative; flex: 1.2; }
        .filter-wrap input, .filter-wrap select { width: 100%; padding: 12px 12px 12px 40px; border-radius: 12px; border: 1.5px solid #eee; outline: none; font-size: 14px; background: #fcfcfc; }
        .f-icon-ui { position: absolute; left: 15px; top: 14px; color: #aaa; z-index: 2; }

        .member-card { background: white; padding: 20px; border-radius: 22px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); border: 1px solid #f0f0f0; position: relative; }
        .b-tag { position: absolute; right: 15px; top: 18px; background: #fff5f5; color: #ff0015; padding: 5px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; border: 1px solid #ffebeb; }

        /* --- 5. PREMIUM 5-COLOR GRADIENT ID CARD --- */
        .id-card-wrap { 
            width: 100%; max-width: 350px; 
            background: 
                linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 50%),
                linear-gradient(to bottom right, #090296 0%, #04b03a 40%, #f2f54e 60%, #ff0015 80%, #ffffff 100%);
            margin: 10px auto 25px auto; border-radius: 20px; color: white; padding: 25px; 
            position: relative; border: 3px solid var(--accent); box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            aspect-ratio: 1.6 / 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden;
        }
        .id-card-wrap h3 { color: var(--accent); margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 8px; font-size: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .id-info { font-size: 14px; margin-bottom: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .id-b-badge { position: absolute; top: 15px; right: 15px; background: var(--danger); padding: 4px 12px; border-radius: 8px; font-weight: bold; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .id-tag-num { position: absolute; bottom: 15px; right: 15px; font-size: 10px; opacity: 0.9; font-weight: bold; color: #090296; }

        /* --- 6. MODERN BOTTOM NAV --- */
        .nav-bar-ui { background: var(--primary); position: fixed; bottom: 0; width: 100%; z-index: 1000; border-radius: 25px 25px 0 0; display: none; padding: 10px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); }
        .nav-ui-container { max-width: 500px; margin: 0 auto; display: flex; justify-content: space-around; align-items: center; }
        .nav-ui-item { color: rgba(255,255,255,0.5); cursor: pointer; text-align: center; font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; transition: 0.3s; text-decoration: none; }
        .nav-ui-item i { font-size: 20px; }
        .nav-ui-item.active { color: var(--accent); }

        .btn-action { background: var(--primary); color: white; width: 100%; padding: 16px; border-radius: 15px; font-weight: bold; border: none; cursor: pointer; font-size: 16px; }
        .btn-call { background: var(--secondary); color: white; padding: 10px 22px; border-radius: 25px; font-size: 13px; text-decoration: none; display: inline-flex; margin-top: 12px; font-weight: bold; box-shadow: 0 4px 12px rgba(4,176,58,0.2); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 10000; backdrop-filter: blur(8px); }
    </style>
</head>
<body>

    <div id="screenLogin" class="screen active-screen">
        <div style="background:white; padding:40px; border-radius:30px; max-width:400px; margin:80px auto; text-align:center; box-shadow:0 15px 50px rgba(0,0,0,0.08); border-top:8px solid var(--primary);">
            <i class="fa-solid fa-om" style="font-size: 55px; color: var(--primary); margin-bottom: 10px;"></i>
            <h2 style="color:var(--primary); font-weight: bold;">వీరశైవ లాగిన్</h2>
            <div style="margin-top: 35px;">
                <div class="f-group"><input type="tel" id="logMobile" placeholder=" "><label>మొబైల్ నంబర్</label></div>
                <div class="f-group"><input type="password" id="logPass" placeholder=" "><label>పాస్ వర్డ్</label><i class="fa-solid fa-eye toggle-pass" onclick="togglePass('logPass', this)"></i></div>
                <button class="btn-action" onclick="handleLogin()">లాగిన్</button>
            </div>
            <p style="margin-top:30px; font-size:14px;">కొత్త సభ్యులా? <a href="#" onclick="showScreen('screenReg')" style="color:var(--secondary); font-weight:bold; text-decoration:none;">నమోదు చేసుకోండి</a></p>
        </div>
    </div>

    <div id="screenReg" class="screen">
        <div style="background:white; padding:25px; border-radius:30px; border-top:8px solid var(--primary); box-shadow:0 5px 25px rgba(0,0,0,0.05);">
            <h2 style="text-align:center; color:var(--primary); margin-bottom:25px; font-weight: bold;">సభ్యత్వ నమోదు</h2>
            <div class="reg-grid">
                <div class="f-group"><input type="text" id="regFname" placeholder=" "><label>పేరు *</label></div>
                <div class="f-group"><input type="text" id="regLname" placeholder=" "><label>ఇంటి పేరు *</label></div>
                <div class="f-group"><select id="regGender"><option value="" selected disabled></option><option value="Male">Male</option><option value="Female">Female</option></select><label>లింగం *</label></div>
                <div class="f-group"><input type="text" id="regGotram" placeholder=" "><label>గోత్రం *</label></div>
                <div class="f-group"><input type="tel" id="regMobile" placeholder=" "><label>మొబైల్ *</label></div>
                <div class="f-group"><select id="regBlood"><option value="" selected disabled></option><option value="A+">A+</option><option value="A-">A-</option><option value="B+">B+</option><option value="B-">B-</option><option value="O+">O+</option><option value="O-">O-</option><option value="AB+">AB+</option><option value="AB-">AB-</option></select><label>బ్లడ్ గ్రూప్ *</label></div>
                <div class="f-group"><input type="text" id="regJob" placeholder=" "><label>వృత్తి *</label></div>
                <div class="f-group"><input type="password" id="regPass" placeholder=" "><label>పాస్ వర్డ్ *</label></div>
                <div class="f-group"><input type="text" id="regVillage" placeholder=" "><label>ఊరు *</label></div>
                <div class="f-group"><input type="number" id="regPin" placeholder=" "><label>పిన్ కోడ్</label></div>
                <div class="f-group"><input type="text" id="regMandal" placeholder=" "><label>మండలం</label></div>
                <div class="f-group"><input type="text" id="regDist" placeholder=" "><label>జిల్లా</label></div>
                <div class="f-group" style="grid-column: 1 / -1;"><input type="text" id="regState" placeholder=" "><label>రాష్ట్రం</label></div>
                <div class="f-group" style="grid-column: 1 / -1;"><input type="email" id="regEmail" placeholder=" "><label>ఈమెయిల్</label></div>
            </div>
            <button class="btn-action" style="background:var(--secondary);" onclick="handleRegister()">రిజిస్టర్ అవ్వండి</button>
            <p style="text-align:center; margin-top:15px;"><a href="#" onclick="showScreen('screenLogin')" style="color:var(--primary); font-weight:bold; text-decoration:none;">లాగిన్ పేజీకి</a></p>
        </div>
    </div>

    <nav id="mainNav" class="nav-bar-ui">
        <div class="nav-ui-container">
            <div class="nav-ui-item active" id="btnDir" onclick="openTab('tabDir')"><i class="fa-solid fa-house-user"></i><span>సభ్యులు</span></div>
            <div class="nav-ui-item" id="btnProf" onclick="openTab('tabProf')"><i class="fa-solid fa-address-card"></i><span>ప్రొఫైల్</span></div>
            <div class="nav-ui-item" onclick="location.reload()" style="color:#ffaaaa;"><i class="fa-solid fa-power-off"></i><span>లాగ్ అవుట్</span></div>
        </div>
    </nav>

    <div id="screenDash" class="screen">
        <div class="notice-container">
            <div class="notice-icon-box"><i class="fa-solid fa-bullhorn"></i></div>
            <div class="notice-content"><span class="notice-label-small">ముఖ్య గమనిక</span><marquee id="noticeText" onmouseover="this.stop();" onmouseout="this.start();">సమాచారం లోడ్ అవుతోంది...</marquee></div>
        </div>

        <div id="tabDir">
            <div class="filter-wrap">
                <div class="srch-box"><i class="fa-solid fa-magnifying-glass f-icon-ui"></i><input type="text" id="dirSearch" onkeyup="filterDir()" placeholder="పేరు లేదా ఊరు..."></div>
                <div class="bld-box"><i class="fa-solid fa-droplet f-icon-ui" style="color:red;"></i><select id="bloodFilter" onchange="filterDir()"><option value="">బ్లడ్ (All)</option><option value="A+">A+</option><option value="A-">A-</option><option value="B+">B+</option><option value="B-">B-</option><option value="O+">O+</option><option value="O-">O-</option><option value="AB+">AB+</option><option value="AB-">AB-</option></select></div>
            </div>
            <div id="dirListContainer"></div>
        </div>

        <div id="tabProf" style="display:none;">
            <div class="id-card-wrap" id="idCard">
                <div class="id-b-badge" id="idBloodDisplay"></div>
                <h3>వీరశైవ సభ్యత్వం</h3>
                <div class="id-info"><b>పేరు:</b> <span id="idName"></span></div>
                <div class="id-info"><b>వృత్తి:</b> <span id="idJob"></span></div>
                <div class="id-info"><b>ఊరు:</b> <span id="idVillage"></span></div>
                <div class="id-tag-num">ID: <span id="idMemberDisplay"></span></div>
            </div>
            <button class="btn-action" style="margin-bottom:25px;" onclick="downloadCard()"><i class="fa-solid fa-download"></i> ID కార్డ్ డౌన్లోడ్</button>
            <div style="background:white; padding:30px; border-radius:30px; border-top:8px solid var(--primary); box-shadow:0 5px 20px rgba(0,0,0,0.05);">
                <h3 style="margin-bottom:25px; color:var(--primary); font-weight: bold;">వివరాలు మార్చుకోండి</h3>
                <input type="hidden" id="curUserId">
                <div class="reg-grid">
                    <div class="f-group" style="grid-column: 1 / -1;"><input type="text" id="uMemberId" readonly placeholder=" " style="background:#f9f9f9;"><label>Unique ID</label></div>
                    <div class="f-group"><input type="text" id="uFname" placeholder=" "><label>పేరు</label></div>
                    <div class="f-group"><input type="text" id="uLname" placeholder=" "><label>ఇంటి పేరు</label></div>
                    <div class="f-group"><select id="uGender"><option value="Male">Male</option><option value="Female">Female</option></select><label>లింగం</label></div>
                    <div class="f-group"><input type="text" id="uGotram" placeholder=" "><label>గోత్రం</label></div>
                    <div class="f-group"><input type="tel" id="uMobile" disabled><label>మొబైల్</label></div>
                    <div class="f-group"><input type="text" id="uJob" placeholder=" "><label>వృత్తి</label></div>
                    <div class="f-group"><select id="uBlood"><option value="A+">A+</option><option value="A-">A-</option><option value="B+">B+</option><option value="B-">B-</option><option value="O+">O+</option><option value="O-">O-</option><option value="AB+">AB+</option><option value="AB-">AB-</option></select><label>బ్లడ్ గ్రూప్</label></div>
                    <div class="f-group"><input type="text" id="uVillage" placeholder=" "><label>ఊరు</label></div>
                    <div class="f-group"><input type="text" id="uMandal" placeholder=" "><label>మండలం</label></div>
                    <div class="f-group"><input type="text" id="uDist" placeholder=" "><label>జిల్లా</label></div>
                    <div class="f-group"><input type="text" id="uState" placeholder=" "><label>రాష్ట్రం</label></div>
                    <div class="f-group"><input type="email" id="uEmail" placeholder=" "><label>ఈమెయిల్</label></div>
                    <div class="f-group" style="grid-column: 1 / -1;"><input type="text" id="uPass" placeholder=" "><label style="color:red;">పాస్ వర్డ్ మార్చండి</label></div>
                </div>
                <button class="btn-action" style="background:var(--secondary);" onclick="updateProfile()">Update Profile</button>
            </div>
        </div>
    </div>

    <div id="customAlert" class="modal-overlay">
        <div style="background:white; padding:35px; border-radius:30px; text-align:center; max-width:400px; width:85%; box-shadow: 0 20px 60px rgba(0,0,0,0.15);">
            <i class="fa-solid fa-circle-check" id="alertIcon" style="font-size:65px; color:var(--secondary);"></i>
            <h3 id="alertTitle" style="margin-top:20px; font-size: 22px;"></h3>
            <p id="alertMsg" style="margin:15px 0 25px 0; color:#666;"></p>
            <button class="btn-action" onclick="closeAlert()">సరే</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDOp_RBaqwTG7hq4_ZUbm4Clb0_LFXX7qw", authDomain: "veerasaivam-9f4f3.firebaseapp.com", projectId: "veerasaivam-9f4f3", storageBucket: "veerasaivam-9f4f3.firebasestorage.app", messagingSenderId: "69482522926", appId: "1:69482522926:web:c1a2790884eb3c4e05b2bf" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.togglePass = (id, el) => {
            const input = document.getElementById(id);
            if(input.type === "password") { input.type = "text"; el.classList.replace("fa-eye", "fa-eye-slash"); }
            else { input.type = "password"; el.classList.replace("fa-eye-slash", "fa-eye"); }
        };

        onSnapshot(doc(db, "app_settings", "notice"), (d) => { if (d.exists()) document.getElementById('noticeText').innerText = d.data().text; });

        window.showAlert = (t, m, type = 'success') => {
            document.getElementById('alertTitle').innerText = t; document.getElementById('alertMsg').innerText = m;
            document.getElementById('alertIcon').style.color = type === 'success' ? 'var(--secondary)' : 'var(--danger)';
            document.getElementById('customAlert').style.display = 'flex';
        };

        window.closeAlert = () => { document.getElementById('customAlert').style.display = 'none'; if(document.getElementById('alertTitle').innerText.includes("విజయం")) location.reload(); };

        window.showScreen = (id) => { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen')); document.getElementById(id).classList.add('active-screen'); };

        window.openTab = (id) => {
            document.getElementById('tabDir').style.display = id === 'tabDir' ? 'block' : 'none'; document.getElementById('tabProf').style.display = id === 'tabProf' ? 'block' : 'none';
            document.getElementById('btnDir').classList.toggle('active', id === 'tabDir'); document.getElementById('btnProf').classList.toggle('active', id === 'tabProf');
        };

        window.handleRegister = async () => {
            const f = document.getElementById('regFname').value; const m = document.getElementById('regMobile').value;
            const g = document.getElementById('regGender').value; const b = document.getElementById('regBlood').value;
            if(!f || !m || !g || !b) return showAlert("గమనిక", "వివరాలన్నీ నింపండి!", "error");
            try {
                const uniqueId = `VS-${new Date().getFullYear()}-${Math.floor(1000 + Math.random() * 9000)}`;
                await addDoc(collection(db, "user_registrations"), {
                    memberId: uniqueId, firstName: f, lastName: document.getElementById('regLname').value, gender: g, gotram: document.getElementById('regGotram').value, mobile: m, password: document.getElementById('regPass').value, bloodGroup: b, profession: document.getElementById('regJob').value, village: document.getElementById('regVillage').value, pincode: document.getElementById('regPin').value, mandal: document.getElementById('regMandal').value, district: document.getElementById('regDist').value, state: document.getElementById('regState').value, email: document.getElementById('regEmail').value, submittedAt: new Date()
                });
                showAlert("విజయం!", `రిజిస్ట్రేషన్ పూర్తయింది. ఐడి: ${uniqueId}`);
                showScreen('screenLogin');
            } catch (e) { alert(e.message); }
        };

        window.handleLogin = async () => {
            const m = document.getElementById('logMobile').value; const p = document.getElementById('logPass').value;
            const q = query(collection(db, "user_registrations"), where("mobile", "==", m), where("password", "==", p));
            const snap = await getDocs(q);
            if (!snap.empty) {
                const user = snap.docs[0]; const d = user.data();
                showScreen('screenDash'); document.getElementById('mainNav').style.display = 'block';
                document.getElementById('idName').innerText = d.firstName + " " + (d.lastName || "");
                document.getElementById('idJob').innerText = d.profession || "N/A";
                document.getElementById('idVillage').innerText = d.village;
                document.getElementById('idBloodDisplay').innerText = d.bloodGroup;
                document.getElementById('idMemberDisplay').innerText = d.memberId || "N/A";
                document.getElementById('curUserId').value = user.id;
                document.getElementById('uMemberId').value = d.memberId || "VS-####";
                document.getElementById('uFname').value = d.firstName || "";
                document.getElementById('uLname').value = d.lastName || "";
                document.getElementById('uGender').value = d.gender || "Male";
                document.getElementById('uGotram').value = d.gotram || "";
                document.getElementById('uMobile').value = d.mobile || "";
                document.getElementById('uJob').value = d.profession || "";
                document.getElementById('uBlood').value = d.bloodGroup || "O+";
                document.getElementById('uVillage').value = d.village || "";
                document.getElementById('uMandal').value = d.mandal || "";
                document.getElementById('uDist').value = d.district || "";
                document.getElementById('uState').value = d.state || "";
                document.getElementById('uEmail').value = d.email || "";
                document.getElementById('uPass').value = d.password || "";
                loadDir();
            } else { showAlert("క్షమించండి", "వివరాలు తప్పు!", "error"); }
        };

        async function loadDir() {
            try {
                const snap = await getDocs(collection(db, "user_registrations"));
                const container = document.getElementById('dirListContainer'); container.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data(); const isFemale = (d.gender === "Female");
                    container.innerHTML += `
                        <div class="member-card" data-blood="${d.bloodGroup}">
                            <div class="b-tag">${d.bloodGroup || '-'}</div>
                            <div style="display:flex; align-items:center; gap:8px;"><b style="font-size:17px; color:var(--primary);">${d.firstName} ${d.lastName || ""}</b> <i class="fa-solid fa-${isFemale ? 'venus' : 'mars'}" style="color:${isFemale?'#ff69b4':'#00d1ff'}; font-size:14px;"></i></div>
                            <div style="font-size:13px; color:#555; margin-top:8px;"><i class="fa-solid fa-briefcase"></i> ${d.profession || 'Business'}</div>
                            <div style="font-size:12px; color:#888; margin-top:3px;"><i class="fa-solid fa-location-dot"></i> ${d.village} | ID: ${d.memberId || '-'}</div>
                            <div>${isFemale ? `<div style="background:#f9f9f9; color:#999; padding:8px 18px; border-radius:25px; font-size:12px; display:inline-flex; margin-top:12px; border:1px dashed #ccc; font-weight:bold;">Privacy Mode</div>` : `<a href="tel:${d.mobile}" class="btn-call"><i class="fa-solid fa-phone"></i> కాల్ చేయండి</a>`}</div>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        window.updateProfile = async () => {
            const id = document.getElementById('curUserId').value;
            try {
                await updateDoc(doc(db, "user_registrations", id), {
                    firstName: document.getElementById('uFname').value, lastName: document.getElementById('uLname').value, gender: document.getElementById('uGender').value, gotram: document.getElementById('uGotram').value, profession: document.getElementById('uJob').value, bloodGroup: document.getElementById('uBlood').value, village: document.getElementById('uVillage').value, mandal: document.getElementById('uMandal').value, district: document.getElementById('uDist').value, state: document.getElementById('uState').value, email: document.getElementById('uEmail').value, password: document.getElementById('uPass').value
                });
                showAlert("విజయం!", "వివరాలు అప్‌డేట్ అయ్యాయి.");
            } catch (e) { alert(e.message); }
        };

        window.downloadCard = () => {
            html2canvas(document.getElementById('idCard'), { scale: 3 }).then(canvas => {
                const link = document.createElement('a'); link.download = `ID_CARD.png`; link.href = canvas.toDataURL(); link.click();
            });
        };

        window.filterDir = () => {
            let searchVal = document.getElementById('dirSearch').value.toLowerCase();
            let bloodVal = document.getElementById('bloodFilter').value;
            document.querySelectorAll('.member-card').forEach(card => {
                let textMatch = card.innerText.toLowerCase().includes(searchVal);
                let bloodMatch = bloodVal === "" || card.getAttribute('data-blood') === bloodVal;
                card.style.display = (textMatch && bloodMatch) ? "block" : "none";
            });
        };
    </script>
</body>
</html>
